# Agent configuration: chart-declared defaults. The Settings UI live-applies
# changes and persists them to the *-overrides objects below instead of
# here, so they survive pod restarts without conflicting with this chart's
# declared values on the next `helm upgrade`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-agent-config
  labels: {{- include "kentinel.labels" . | nindent 4 }}
data:
  LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  LLM_MODEL: {{ .Values.llm.model | quote }}
  OLLAMA_HOST: {{ include "kentinel.ollamaHost" . | quote }}
  AGENT_REVIEW_INTERVAL: {{ .Values.agent.reviewInterval | quote }}
  AGENT_MONITOR_ENABLED: {{ .Values.agent.monitorEnabled | quote }}
  NOTIFICATIONS_ENABLED: {{ .Values.notifications.enabled | quote }}
  NOTIFY_MIN_SEVERITY: {{ .Values.notifications.minSeverity | quote }}
  {{- if .Values.agent.persistence.enabled }}
  INSIGHT_DB_PATH: "/data/insights.db"
  {{- end }}
  INSIGHT_RETENTION_DAYS: {{ .Values.agent.insightRetentionDays | quote }}
  PROMETHEUS_URL: {{ include "kentinel.prometheusUrl" . | quote }}
  LOG_FORMAT: {{ .Values.logFormat | quote }}
  LOG_LEVEL: {{ .Values.logLevel | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-agent-secrets
  labels: {{- include "kentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.llm.apiKeys.anthropic | quote }}
  OPENAI_API_KEY: {{ .Values.llm.apiKeys.openai | quote }}
  DEEPSEEK_API_KEY: {{ .Values.llm.apiKeys.deepseek | quote }}
  GEMINI_API_KEY: {{ .Values.llm.apiKeys.gemini | quote }}
  DISCORD_WEBHOOK_URL: {{ .Values.notifications.discordWebhookUrl | quote }}
  SLACK_WEBHOOK_URL: {{ .Values.notifications.slackWebhookUrl | quote }}
  TEAMS_WEBHOOK_URL: {{ .Values.notifications.teamsWebhookUrl | quote }}
---
# Settings-UI write-back targets. The server only ever writes here, never to
# the ConfigMap/Secret above — this chart never declares data for these, so
# there's no field ownership for `helm upgrade` to conflict with. The agent
# Deployment layers these on top of the objects above via envFrom order, so
# a saved setting wins and survives pod restarts, while anything never
# touched from the Settings UI keeps following the chart's declared values.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-agent-config-overrides
  labels: {{- include "kentinel.labels" . | nindent 4 }}
data: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-agent-secrets-overrides
  labels: {{- include "kentinel.labels" . | nindent 4 }}
type: Opaque
data: {}
