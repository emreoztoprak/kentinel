# Release pipeline: runs when a version tag (v*) is pushed.
# Publishes multi-arch container images and the Helm chart to GHCR.
#
#   git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kentinel

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --no-audit --no-fund
        working-directory: web
      - run: npm run build
        working-directory: web

  images:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: version
        run: |
          VERSION="${{ inputs.version || '' }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-server:latest
      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-agent:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-agent:latest

  chart:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Resolve version
        id: version
        run: |
          VERSION="${{ inputs.version || '' }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Package and push chart
        run: |
          helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
          helm package charts/kentinel \
            --version ${{ steps.version.outputs.version }} \
            --app-version ${{ steps.version.outputs.version }}
          helm push kentinel-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
