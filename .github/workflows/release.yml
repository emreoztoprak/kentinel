# Release pipeline: runs when a version tag (v*) is pushed.
# Publishes multi-arch container images and the Helm chart to GHCR.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Security notes:
# - Third-party actions are pinned to commit SHAs (tags are mutable).
# - The version string is validated against a strict semver pattern and
#   passed into run: scripts via env, never inline ${{ }} interpolation —
#   a crafted workflow_dispatch input or tag name must not become shell.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kentinel

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm ci --no-audit --no-fund
        working-directory: web
      - run: npm run build
        working-directory: web

  images:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          VERSION="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          VERSION="${VERSION#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "refusing to release: version '$VERSION' is not X.Y.Z[-prerelease]" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build and push server image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-server:latest
      - name: Build and push agent image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-agent:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-agent:latest

  scan:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          VERSION="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          VERSION="${VERSION#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "refusing to release: version '$VERSION' is not X.Y.Z[-prerelease]" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      # Fails the release on CRITICAL/HIGH vulnerabilities that have a fix
      # available (ignore-unfixed: unpatched base-image CVEs would otherwise
      # block every release until upstream ships a fix).
      - name: Scan server image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-server:${{ steps.version.outputs.version }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      - name: Scan agent image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-agent:${{ steps.version.outputs.version }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  chart:
    needs: [images, scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          VERSION="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          VERSION="${VERSION#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "refusing to release: version '$VERSION' is not X.Y.Z[-prerelease]" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Package and push chart
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          helm registry login ghcr.io -u "$GITHUB_ACTOR" -p "$GH_TOKEN"
          helm package charts/kentinel \
            --version "$VERSION" \
            --app-version "$VERSION"
          helm push "kentinel-$VERSION.tgz" \
            "oci://ghcr.io/$GITHUB_REPOSITORY_OWNER/charts"

  github-release:
    needs: chart
    runs-on: ubuntu-latest
    # A tag alone isn't a GitHub Release — the dashboard's update-check
    # card reads /releases/latest, which 404s without one. Scoped to just
    # this job: the rest of the pipeline only needs contents: read.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          VERSION="${INPUT_VERSION:-${GITHUB_REF_NAME#v}}"
          VERSION="${VERSION#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "refusing to release: version '$VERSION' is not X.Y.Z[-prerelease]" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
