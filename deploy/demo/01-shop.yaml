# Demo application: a small, healthy "shop" microservice stack.
#   make demo-up       -> deploy this (everything green)
#   make demo-incident -> break things (02-incidents.yaml)
#   make demo-reset    -> remove the incidents, back to green
#   make demo-down     -> delete the whole namespace
apiVersion: v1
kind: Namespace
metadata:
  name: shop
---
# Storefront: nginx serving the (imaginary) web UI. Good target for the
# YAML-edit demo (scale replicas) and the pod Terminal demo (has /bin/sh).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storefront
  namespace: shop
  labels: { app: storefront }
spec:
  replicas: 2
  selector:
    matchLabels: { app: storefront }
  template:
    metadata:
      labels: { app: storefront }
    spec:
      containers:
        - name: storefront
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: storefront
  namespace: shop
spec:
  selector: { app: storefront }
  ports: [{ port: 80 }]
---
# Orders API: continuously logs realistic order lines — the target for the
# live log-following demo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: shop
  labels: { app: orders-api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: orders-api }
  template:
    metadata:
      labels: { app: orders-api }
    spec:
      containers:
        - name: orders-api
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "[orders-api] v2.1.0 listening on :8080";
              while true; do
                id=$((RANDOM % 90000 + 10000));
                total=$((RANDOM % 190 + 9));
                echo "$(date -Iseconds) INFO  order accepted id=ord-$id total=\$$total.99 items=$((RANDOM % 4 + 1)) status=confirmed";
                if [ $((RANDOM % 12)) -eq 0 ]; then
                  echo "$(date -Iseconds) WARN  slow upstream response from inventory-service latency=1.$((RANDOM % 9))s";
                fi;
                sleep 2;
              done
          resources:
            requests: { cpu: 10m, memory: 8Mi }
            limits: { memory: 32Mi }
---
# Cache: a real Redis, because every shop has one.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  namespace: shop
  labels: { app: cache }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cache }
  template:
    metadata:
      labels: { app: cache }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: shop
spec:
  selector: { app: cache }
  ports: [{ port: 6379 }]
---
# Storefront settings: the target for the ConfigMap YAML-edit demo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: storefront-config
  namespace: shop
data:
  BANNER_MESSAGE: "Welcome to the shop!"
  FEATURE_RECOMMENDATIONS: "true"
  THEME: "light"
---
# Toolbox: a long-running shell pod for the Terminal demo.
apiVersion: v1
kind: Pod
metadata:
  name: toolbox
  namespace: shop
  labels: { app: toolbox }
spec:
  containers:
    - name: toolbox
      image: busybox:1.36
      command: ["sh", "-c", "while true; do sleep 3600; done"]
      resources:
        requests: { cpu: 5m, memory: 8Mi }
        limits: { memory: 32Mi }
