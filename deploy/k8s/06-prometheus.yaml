# Minimal in-cluster Prometheus — the metrics source for the AI agent.
# Scrapes only the kubelets (resource metrics + cAdvisor) through the API
# server proxy: pod/node CPU & memory usage and CPU throttling. That is all
# the agent needs; it is NOT a full monitoring stack (no alertmanager, no
# node-exporter, no kube-state-metrics).
#
# Already have Prometheus? Delete everything in this file and point the agent
# at yours from Settings → Metrics → Prometheus URL.
#   kubectl -n kentinel delete deploy/prometheus svc/prometheus pvc/prometheus-data \
#     configmap/prometheus-config serviceaccount/prometheus
#   kubectl delete clusterrole kentinel-prometheus clusterrolebinding kentinel-prometheus
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: kentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kentinel-prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics]
    verbs: [get, list, watch]
  - nonResourceURLs: ["/metrics"]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kentinel-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kentinel-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: kentinel
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: kentinel
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      # Kubelet resource metrics: pod_cpu_usage_seconds_total,
      # pod_memory_working_set_bytes, node_cpu_usage_seconds_total, ...
      - job_name: kubelet-resource
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/resource
      # cAdvisor: container_cpu_cfs_throttled_periods_total,
      # machine_memory_bytes, container_memory_working_set_bytes, ...
      - job_name: kubelet-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: kentinel
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: kentinel
  labels:
    app.kubernetes.io/name: kentinel
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate # PVC is ReadWriteOnce
  selector:
    matchLabels:
      app.kubernetes.io/name: kentinel
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kentinel
        app.kubernetes.io/component: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534 # nobody — makes the data volume writable
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.listen-address=:9090
          ports:
            - containerPort: 9090
              name: http
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: kentinel
spec:
  selector:
    app.kubernetes.io/name: kentinel
    app.kubernetes.io/component: prometheus
  ports:
    - port: 9090
      targetPort: http
