# RBAC is split on purpose:
#   - "server" can read everything the UI shows, update/patch for the YAML
#     editor, and use pods/log + pods/exec.
#   - "agent" is strictly read-only (get/list/watch + pods/log). It cannot
#     mutate anything. Verify with:
#       kubectl auth can-i delete pods --as=system:serviceaccount:kentinel:agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: server
  namespace: kentinel
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent
  namespace: kentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kentinel-server
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
      - namespaces
      - nodes
      - events
    verbs: [get, list, watch, update, patch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kentinel-agent
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - configmaps
      - persistentvolumeclaims
      - namespaces
      - nodes
      - events
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets, replicasets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
  # Note: the agent deliberately has no access to secrets and no write verbs.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kentinel-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kentinel-server
subjects:
  - kind: ServiceAccount
    name: server
    namespace: kentinel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kentinel-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kentinel-agent
subjects:
  - kind: ServiceAccount
    name: agent
    namespace: kentinel
