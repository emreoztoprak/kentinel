# Insight history database. Use a block-storage class (the default on most
# clouds and minikube); avoid NFS-backed storage — SQLite file locking is
# unreliable there. See docs/ai-agent.md → Insight history.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-data
  namespace: kentinel
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: kentinel
  labels:
    app.kubernetes.io/name: kentinel
    app.kubernetes.io/component: agent
spec:
  # Exactly one replica: the agent is single-writer by design (one review
  # loop, one notification stream, one SQLite writer).
  replicas: 1
  strategy:
    type: Recreate # the data PVC is ReadWriteOnce
  selector:
    matchLabels:
      app.kubernetes.io/name: kentinel
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kentinel
        app.kubernetes.io/component: agent
    spec:
      serviceAccountName: agent
      securityContext:
        # distroless nonroot uid; makes the data volume writable
        fsGroup: 65532
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: agent-data
      containers:
        - name: agent
          image: ghcr.io/emreoztoprak/kentinel-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          envFrom:
            - configMapRef:
                name: agent-config
            - secretRef:
                name: agent-secrets
            # Settings-UI overrides win: envFrom takes the last-listed source
            # for any key defined in more than one.
            - configMapRef:
                name: agent-config-overrides
                optional: true
            - secretRef:
                name: agent-secrets-overrides
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: agent
  namespace: kentinel
spec:
  selector:
    app.kubernetes.io/name: kentinel
    app.kubernetes.io/component: agent
  ports:
    - port: 8090
      targetPort: http
